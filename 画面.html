<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ToDo メモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eae6df; --paper:#f7f5f0; --paper2:#fbfaf6;
    --ink:#4b453e; --sub:#a59c92; --line:#ded7cc;
    --accent:#b89a8c; --done:#a9b29a;
    --gold:#c8a24e; --rose:#c98a93;
    --shadow:0 6px 22px rgba(75,69,62,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:16px;line-height:1.6}
  body{padding:max(16px,env(safe-area-inset-top)) 14px calc(40px + env(safe-area-inset-bottom));
    background-image:radial-gradient(circle at 18% 0%,rgba(255,255,255,.35),transparent 60%)}
  .wrap{max-width:720px;margin:0 auto}

  header{text-align:center;padding:10px 0 4px}
  .brand{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;letter-spacing:.06em;line-height:1}
  .brand .dot{color:var(--accent)}
  .tagline{font-family:'Caveat',cursive;font-size:20px;color:var(--accent);margin-top:1px}
  .today{margin-top:6px;font-size:12px;letter-spacing:.22em;color:var(--sub);text-transform:uppercase}

  /* ---- タブ ---- */
  .tabbar{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:center;margin:16px 0 4px}
  .tabbar .brk{flex-basis:100%;height:0;margin:0}
  .tab{position:relative;border:none;background:transparent;cursor:pointer;color:var(--sub);
    font-family:'Zen Kaku Gothic New',sans-serif;padding:6px 4px 9px;font-size:14.5px;letter-spacing:.03em;transition:color .2s}
  .tab .no{font-family:'Cormorant Garamond',serif;font-size:12.5px;font-style:italic;margin-right:5px;opacity:.7}
  .tab::after{content:"";position:absolute;left:6px;right:6px;bottom:2px;height:2px;border-radius:2px;background:transparent;transition:background .2s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink)}
  .tab.active::after{background:var(--tabc,var(--accent))}
  .tab.daily .no{font-style:normal}
  .tab.iconbtn{color:var(--accent);font-size:17px;padding:5px 7px}
  .tab.iconbtn.on{color:var(--ink)}
  .tabchip{display:inline-flex;align-items:center;gap:2px}
  .tabchip .mv{border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:12px;padding:2px 3px;border-radius:6px}
  .tabchip .mv:hover{background:#efeae2;color:var(--ink)}

  /* ---- カード ---- */
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);
    padding:18px 16px 14px;margin-top:12px;border:1px solid rgba(255,255,255,.6)}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding-bottom:12px;margin-bottom:4px;border-bottom:1px solid var(--line)}
  .card-title{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600;letter-spacing:.04em}
  .card-title .en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--sub);letter-spacing:.06em;margin-left:8px}
  .count{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--sub);white-space:nowrap}

  /* ---- アウトライン ---- */
  .tree{margin:2px 0}
  .row{display:flex;align-items:flex-start;gap:6px;padding:4px 2px;border-radius:9px;position:relative}
  .row:hover{background:#f1ece4}
  .drag{flex:none;width:15px;height:24px;display:grid;place-items:center;color:var(--line);cursor:grab;
    touch-action:none;user-select:none}
  .drag:hover{color:var(--sub)} .drag:active{cursor:grabbing}
  .row.dragsrc{opacity:.45}
  .row.drop-after{box-shadow:inset 0 -3px 0 -1px var(--accent)}
  body.dragging{user-select:none;cursor:grabbing}
  .twist{flex:none;width:15px;height:24px;display:grid;place-items:center;cursor:pointer;color:var(--sub);font-size:10px;user-select:none}
  .twist.empty{cursor:default;opacity:0}
  .check{flex:none;width:21px;height:21px;margin-top:1px;border-radius:50%;border:2px solid var(--line);
    background:var(--paper2);cursor:pointer;display:grid;place-items:center;transition:all .16s}
  .check:hover{border-color:var(--accent)}
  .check svg{width:11px;height:11px;stroke:#fff;stroke-width:3.6;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.4);transition:all .16s}
  .check.on{background:var(--done);border-color:var(--done)}
  .check.on svg{opacity:1;transform:scale(1)}

  .label{flex:1;min-width:0;cursor:text;word-break:break-word;padding:1px 2px;line-height:1.5}
  .row.done > .label{color:var(--sub);text-decoration:line-through;text-decoration-color:var(--line)}
  .row.sec > .label{font-family:'Shippori Mincho',serif;font-size:17px;letter-spacing:.03em}
  .row.sub > .label{color:#6f675e}
  .row.d2 > .label{font-size:15px}
  .row.d3 > .label,.row.d4 > .label{font-size:13.5px;color:#6f675e}
  .label a{color:var(--accent)}
  .label .ed{width:100%;border:none;border-bottom:1px solid var(--accent);background:transparent;font:inherit;color:var(--ink);outline:none;padding:1px 0}
  .mark{flex:none;border:none;background:transparent;cursor:pointer;color:var(--line);font-size:15px;padding:2px 2px;margin-top:1px;line-height:1}
  .mark.daily{color:var(--gold)}
  .mark.today{color:var(--rose)}
  /* ★定期 / ❀その日 を横並びで選択（排他・もう一度で解除） */
  .mk2{flex:none;border:none;background:transparent;cursor:pointer;color:var(--line);
    padding:2px 3px;margin-top:1px;line-height:0;border-radius:6px;transition:color .15s,transform .15s}
  .mk2:hover{color:var(--accent);background:#efece6}
  .mk2.on{transform:scale(1.1)}
  .menu{flex:none;border:none;background:transparent;cursor:pointer;color:var(--sub);font-size:15px;padding:2px 4px;margin-top:1px;border-radius:6px;line-height:1}
  .menu:hover,.menu.on{background:#e7e1d7;color:var(--ink)}
  .del{flex:none;border:none;background:transparent;cursor:pointer;color:var(--line);font-size:13px;padding:2px 5px;margin-top:1px;border-radius:6px;line-height:1}
  .del:hover{background:#f3dede;color:#c0392b}
  /* タブ一括選択バー */
  .bulkbar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:8px 2px 0;font-size:12px;color:var(--sub)}
  .bulkbar .bl{letter-spacing:.04em}
  /* 買い物リスト */
  .shoprow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:10px 2px 2px}
  .shopopen{border:1px solid var(--accent);background:#f3ece4;color:var(--ink);cursor:pointer;
    font-family:'Shippori Mincho',serif;font-size:14px;padding:7px 16px;border-radius:999px;letter-spacing:.04em}
  .shopopen:hover{background:#eee2d6}
  .shophint{font-size:11.5px;color:var(--sub)}
  .shopbar{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
  /* 概要（ToDoOverview） */
  .ovwrap{overflow-x:auto;margin:6px 0 2px}
  .ovtable{border-collapse:collapse;width:100%;font-size:13px}
  .ovtable th,.ovtable td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top;line-height:1.5}
  .ovtable th{background:#efece6;font-weight:600;white-space:nowrap}
  .ovtable td a{color:var(--accent)}
  .ovtext{padding:4px 2px}
  .ovtext p{margin:4px 0;line-height:1.7;font-size:14px}
  .ovtext .ovsp{height:8px}
  .datebar{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 6px}
  /* 選択ハイライト */
  .row.sel{background:#efe7db;box-shadow:inset 0 0 0 1.5px var(--accent);border-radius:9px}
  /* 下部入力バー（コンポーザ） */
  body.has-composer{padding-bottom:calc(150px + env(safe-area-inset-bottom))}
  .composer{position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--paper2);
    border-top:1px solid var(--line);box-shadow:0 -6px 20px rgba(75,69,62,.10);
    padding:8px 14px calc(10px + env(safe-area-inset-bottom));max-width:720px;margin:0 auto}
  .composer .cmpsel{font-size:11.5px;color:var(--sub);margin:0 2px 6px;line-height:1.5}
  .cmpx{border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;padding:0 4px;margin-left:4px}
  .cmpinput{display:block;width:100%;border:1px solid var(--line);border-radius:11px;padding:10px 12px;
    font:inherit;font-size:15px;color:var(--ink);background:var(--paper);outline:none}
  .cmpinput:focus{border-color:var(--accent)}
  .cmpctrl{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:8px}
  .cmpl{font-size:11.5px;color:var(--sub)}
  .clv{border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--sub);
    font-size:12.5px;padding:6px 13px;border-radius:999px}
  .clv.on{border-color:var(--accent);color:var(--ink);background:#f3ece4}
  .cmpgo{border:1px solid var(--accent);background:#f3ece4;cursor:pointer;color:var(--ink);
    font-family:'Shippori Mincho',serif;font-size:14px;padding:8px 18px;border-radius:999px;letter-spacing:.03em}
  .cmpgo:hover{background:#eee2d6}
  .cmpdl{display:block;width:100%;border:1px solid var(--line);border-radius:11px;padding:8px 12px;margin-top:6px;
    font:inherit;font-size:13.5px;color:var(--ink);background:var(--paper);outline:none}
  .cmpdl:focus{border-color:var(--accent)}
  .cmpundo{margin-left:auto;border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--sub);
    font-size:12.5px;padding:7px 13px;border-radius:999px}
  .cmpundo:hover{border-color:var(--accent);color:var(--ink)}
  /* 期限バッジ */
  .dl{flex:none;font-size:11px;color:#b08a2e;border:1px solid #e3d2a3;background:#faf4e6;
    padding:1px 7px;border-radius:8px;margin:1px 4px 0 0;white-space:nowrap;align-self:center}
  /* ドラッグで「中へ」入れる時の表示 */
  .row.drop-into{background:#e9efe3;box-shadow:inset 3px 0 0 var(--done),inset 0 0 0 1px var(--done)}
  .bulkbar button{border:1px solid var(--line);background:var(--paper2);cursor:pointer;color:var(--sub);
    font-size:12px;padding:4px 10px;border-radius:8px;line-height:1.2}
  .bulkbar button:hover{border-color:var(--accent);color:var(--ink)}
  .toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:4px 2px 8px 26px}
  .toolbar button{border:1px solid var(--line);background:var(--paper2);cursor:pointer;color:var(--sub);
    font-size:12px;padding:4px 9px;border-radius:8px;line-height:1.2}
  .toolbar button:hover{border-color:var(--accent);color:var(--ink)}
  .toolbar .tbbulk{background:#f3ece4;border-color:#e3d8c9}
  .kids{margin-left:10px;border-left:1px dashed var(--line);padding-left:6px}

  .addline{margin:8px 0 2px;padding-left:4px}
  .addline button{border:1px dashed var(--line);background:transparent;color:var(--sub);cursor:pointer;
    border-radius:10px;padding:6px 14px;font:inherit;font-size:13.5px;letter-spacing:.04em}
  .addline button:hover{border-color:var(--accent);color:var(--accent)}
  .empty{text-align:center;color:var(--sub);padding:18px 10px;font-family:'Shippori Mincho',serif;font-size:13.5px}
  .empty .sw{font-family:'Caveat',cursive;font-size:19px;color:var(--accent);display:block;margin-top:3px}
  .hint{font-size:11.5px;color:var(--sub);text-align:center;margin-top:10px;letter-spacing:.02em;line-height:1.7}

  /* ---- 今日のチェック ---- */
  .progress{display:flex;align-items:center;gap:14px;margin:2px 0 8px}
  .ring{--p:0;flex:none;width:60px;height:60px;border-radius:50%;
    background:conic-gradient(var(--done) calc(var(--p)*1%),#e7e1d7 0);display:grid;place-items:center}
  .ring i{width:46px;height:46px;border-radius:50%;background:var(--paper);display:grid;place-items:center;
    font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--ink);font-style:normal}
  .pmsg{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ink)}
  .pmsg small{display:block;color:var(--sub);font-size:11.5px;letter-spacing:.03em;font-family:'Zen Kaku Gothic New'}
  .group-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--sub);
    letter-spacing:.05em;margin:12px 2px 2px;padding-bottom:3px;border-bottom:1px solid var(--line)}
  /* 今日のチェック：階層を保ったツリー */
  .dctx{display:flex;align-items:center;gap:6px;padding:5px 2px 2px;color:var(--sub);font-size:13px}
  .dctx.s0{font-family:'Shippori Mincho',serif;font-size:14.5px;color:#6f675e;margin-top:4px}
  .dchk{display:flex;align-items:flex-start;gap:9px;padding:6px 2px}
  .dchk .ico{flex:none;margin-top:2px;font-size:14px;line-height:1}
  .dchk .ico.daily{color:var(--gold)} .dchk .ico.today{color:var(--rose)}
  .dchk span.t{flex:1;word-break:break-word}
  .dchk.done span.t{color:var(--sub);text-decoration:line-through;text-decoration-color:var(--line)}
  .dkids{margin-left:13px;border-left:1px dashed var(--line);padding-left:8px}
  .legend{display:flex;gap:16px;justify-content:center;margin:2px 0 6px;font-size:12px;color:var(--sub)}
  .legend b{font-weight:400} .legend .g{color:var(--gold)} .legend .r{color:var(--rose)}
  .tabhint{text-align:center;font-size:11.5px;color:var(--sub);margin:2px 0 0;letter-spacing:.02em}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fbfaf6;padding:9px 19px;border-radius:999px;font-size:13px;letter-spacing:.03em;
    opacity:0;pointer-events:none;transition:all .3s;z-index:50;box-shadow:var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{text-align:center;color:var(--sub);padding:50px 0;font-family:'Shippori Mincho',serif}

  footer{text-align:center;margin-top:22px;color:var(--sub);font-size:11px;letter-spacing:.18em}
  footer .hr{width:40px;height:1px;background:var(--line);margin:0 auto 10px}

  /* ---- 手書き線画マーク（定期＝きらめき／その日＝小花） ---- */
  .mki{width:16px;height:16px;display:inline-block;vertical-align:-3px;
    stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;overflow:visible}

  /* ---- ツールバー（印刷・保存） ---- */
  .tools{display:flex;gap:8px;justify-content:center;margin:8px 0 0}
  .tbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--paper2);
    cursor:pointer;color:var(--sub);font-size:12.5px;padding:5px 15px;border-radius:999px;letter-spacing:.08em;
    font-family:'Shippori Mincho',serif;transition:all .18s}
  .tbtn:hover{border-color:var(--accent);color:var(--ink)}
  .tbtn:disabled{opacity:.4;cursor:default;border-color:var(--line);color:var(--sub)}
  .tbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

  /* ---- モーダル ---- */
  .modal-bg{position:fixed;inset:0;background:rgba(75,69,62,.34);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--paper2);border-radius:18px;box-shadow:var(--shadow);max-width:380px;width:100%;
    padding:22px 20px 14px;border:1px solid rgba(255,255,255,.7)}
  .mtitle{font-family:'Shippori Mincho',serif;font-size:19px;text-align:center;margin-bottom:6px;letter-spacing:.06em}
  .mdesc{font-size:12.5px;color:var(--sub);line-height:1.7;margin-bottom:14px;text-align:center}
  .mdesc b{color:var(--accent);font-weight:500}
  .mscope{font-size:12px;color:var(--sub);display:flex;gap:6px;align-items:center;justify-content:center;margin-bottom:13px}
  .chip{border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--sub);font-size:12px;padding:4px 13px;border-radius:999px}
  .chip.on{border-color:var(--accent);color:var(--ink);background:#f3ece4}
  .mbtn{display:block;width:100%;border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--ink);
    font-size:14px;padding:11px 14px;border-radius:12px;margin-bottom:9px;font-family:'Shippori Mincho',serif;letter-spacing:.03em}
  .mbtn:hover{border-color:var(--accent)}
  .mbtn.rec{border-color:var(--accent);background:#f3ece4}
  .mlink{display:block;margin:2px auto 0;border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:12.5px;padding:7px}
  .mresult{font-size:12.5px;text-align:center;min-height:18px;margin:2px 0 8px;line-height:1.7}
  .mresult a{color:var(--accent)} .mwait{color:var(--sub)} .merr{color:#c0392b}
  .minput{display:block;width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font:inherit;font-size:15px;color:var(--ink);background:var(--paper);margin-bottom:12px;outline:none}
  .minput:focus{border-color:var(--accent)}

  /* ---- 印刷 ---- */
  #printArea{display:none}
  @media print{
    body{background:#fff;padding:0}
    .wrap,#toast,.modal-bg,.tools,.composer{display:none !important}
    #printArea{display:block !important;color:#3a342e;font-family:'Shippori Mincho',serif;padding:6mm}
    .phead{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1.5px solid #cbbfae;padding-bottom:6px;margin-bottom:14px}
    .pbrand{font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.04em}
    .pbrand span{color:#b89a8c}
    .pmeta{font-size:12px;color:#8a8175;letter-spacing:.12em}
    .psec{margin-bottom:16px;break-inside:avoid}
    .psec h2{font-size:17px;border-bottom:1px solid #e3dccf;padding-bottom:3px;margin:0 0 8px;font-weight:600}
    .ptree{list-style:none;margin:0;padding-left:14px}
    .ptree .ptree{padding-left:18px}
    .ptree li{margin:3px 0;line-height:1.5;font-size:13px}
    .pbox{display:inline-block;width:17px;color:#9a9183}
    .ptx.pdone{color:#9a9183;text-decoration:line-through}
    .pmk{font-size:10px;margin-left:7px;padding:1px 7px;border-radius:8px;border:1px solid #d8cdbb;white-space:nowrap}
    .pmk.pd{color:#b08a2e;border-color:#e3d2a3}
    .pmk.pt{color:#bd7681;border-color:#ecc9cd}
    .ptree a{color:inherit;text-decoration:none}
    @page{margin:12mm}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">memo<span class="dot">.</span></div>
    <div class="tagline">my little check list</div>
    <div class="today" id="todayLabel"></div>
  </header>
  <div class="tabbar" id="tabbar"></div>
  <div class="tabhint" id="tabhint"></div>
  <div class="tools">
    <button class="tbtn" id="undoBtn" onclick="undo()" disabled><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5M4 9h11a5 5 0 0 1 0 10h-3"/></svg>戻る</button>
    <button class="tbtn" onclick="openModal('print')"><svg viewBox="0 0 24 24"><path d="M6 9V4h12v5M6 18H4v-6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v6h-2M7 14h10v6H7z"/></svg>印刷</button>
    <button class="tbtn" onclick="openModal('save')"><svg viewBox="0 0 24 24"><path d="M12 4v11m0 0l-4-4m4 4l4-4M5 19h14"/></svg>保存</button>
  </div>
  <div id="view"><div class="loading">よみこみ中…</div></div>
  <footer><div class="hr"></div>DAILY &nbsp;·&nbsp; TO DO &nbsp;·&nbsp; MEMO</footer>
</div>
<div id="toast"></div>
<div id="composer" class="composer" style="display:none">
  <div id="cmpsel" class="cmpsel"></div>
  <input id="cmpinput" class="cmpinput" maxlength="200" placeholder="追加する内容を入力" onkeydown="cmpKey(event)">
  <input id="cmpdl" class="cmpdl" maxlength="40" placeholder="期限（任意：6/30・今週・早め など）" onkeydown="if(event.key==='Enter'){event.preventDefault();composerSubmit();}">
  <div class="cmpctrl">
    <span class="cmpl">レベル</span>
    <button class="clv" data-l="0" onclick="setCLevel(0)">中タブ</button>
    <button class="clv" data-l="1" onclick="setCLevel(1)">小タブ</button>
    <button class="clv" data-l="2" onclick="setCLevel(2)">孫</button>
    <button class="clv" data-l="3" onclick="setCLevel(3)">孫の孫</button>
    <button class="cmpundo" onclick="undo()" title="元に戻す">↶ 戻る</button>
    <button id="cmpgo" class="cmpgo" onclick="composerSubmit()">＋ 追加</button>
  </div>
</div>
<div id="printArea"></div>
<div id="modal" class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>

<script>
/* ===== 状態 ===== */
var STATE={today:'',tabs:[],nodes:[],todayChecks:[],active:null,editTabs:false,editingId:null,menuId:null,shopping:null,selected:null,editing:false,cLevel:1};
var TAB_COLORS=['#b89a8c','#9bb0b8','#c2a9b4','#a9b29a','#c9b489','#a8a59c'];
var DAILY='__daily__';
var OVERVIEW='__overview__';
var SCHEDULE='__schedule__';

/* ===== サーバ呼び出し（無い場合はMOCKへ） ===== */
function call(fn,args){
  return new Promise(function(res,rej){
    if(window.google&&google.script&&google.script.run){
      var r=google.script.run.withSuccessHandler(res).withFailureHandler(rej);
      r[fn].apply(r,args||[]);
    }else if(window.MOCK&&window.MOCK[fn]){ try{res(window.MOCK[fn].apply(null,args||[]));}catch(e){rej(e);} }
    else rej(new Error('no backend'));
  });
}

/* ===== 初期化 ===== */
function boot(){
  call('getData',[null]).then(function(d){
    STATE.today=d.today;STATE.tabs=d.tabs||[];STATE.nodes=d.nodes||[];STATE.todayChecks=d.todayChecks||[];
    STATE.active=(STATE.tabs[0]&&STATE.tabs[0].id)||DAILY;
    cleanupEmptyNodes(); // 以前の取り残し（空欄項目）を起動時に掃除
    renderToday();renderTabs();renderView();
  }).catch(function(e){document.getElementById('view').innerHTML='<div class="loading">読み込みに失敗しました。<br>'+esc(e.message||e)+'</div>';});
}
function renderToday(){
  var p=(STATE.today||'').split('-'),wd=['日','月','火','水','木','金','土'],label=STATE.today;
  if(p.length===3){var dt=new Date(+p[0],+p[1]-1,+p[2]);label=p[0]+'.'+p[1]+'.'+p[2]+'  '+wd[dt.getDay()];}
  document.getElementById('todayLabel').textContent=label;
}

/* ===== タブ ===== */
function tabColor(i){return TAB_COLORS[i%TAB_COLORS.length];}
function tabName(id){var t=STATE.tabs.filter(function(x){return x.id===id;})[0];return t?t.name:'';}
function renderTabs(){
  var bar=document.getElementById('tabbar');bar.innerHTML='';
  // 今日のチェックを先頭に置く
  var dt=document.createElement('button');
  dt.className='tab daily'+(STATE.active===DAILY?' active':'');
  dt.style.setProperty('--tabc','#c2a9b4');
  dt.innerHTML='<span class="no">✦</span>今日のチェック';
  dt.onclick=function(){switchTab(DAILY);};
  bar.appendChild(dt);
  // 概要（Cowork等が書き出した ToDoOverview を表示）
  var ov=document.createElement('button');
  ov.className='tab daily'+(STATE.active===OVERVIEW?' active':'');
  ov.style.setProperty('--tabc','#9bb0b8');
  ov.innerHTML='<span class="no">📋</span>概要';
  ov.onclick=function(){openOverview();};
  bar.appendChild(ov);
  // 予定（Cowork等が作った1日のスケジュールを表示）
  var sc=document.createElement('button');
  sc.className='tab daily'+(STATE.active===SCHEDULE?' active':'');
  sc.style.setProperty('--tabc','#c9b489');
  sc.innerHTML='<span class="no">📅</span>予定';
  sc.onclick=function(){openSchedule();};
  bar.appendChild(sc);
  // 改行（以降の大タブは次の行から）
  var brk=document.createElement('span');brk.className='brk';bar.appendChild(brk);
  STATE.tabs.forEach(function(t,i){
    var chip=document.createElement('span');chip.className='tabchip';
    if(STATE.editTabs){
      var l=mvBtn('◀',function(){moveTab(i,-1);});chip.appendChild(l);
    }
    var b=document.createElement('button');
    b.className='tab'+(STATE.active===t.id?' active':'');
    b.style.setProperty('--tabc',tabColor(i));
    b.innerHTML='<span class="no">'+pad2(i+1)+'</span>'+esc(t.name);
    b.onclick=function(){ if(STATE.editTabs){editTabName(t);} else {switchTab(t.id);} };
    chip.appendChild(b);
    if(STATE.editTabs){
      chip.appendChild(mvBtn('▶',function(){moveTab(i,1);}));
      chip.appendChild(mvBtn('✕',function(){removeTab(t);}));
    }
    bar.appendChild(chip);
  });
  // ＋追加・✎編集
  var add=document.createElement('button');add.className='tab iconbtn';add.textContent='＋';add.title='タブを追加';
  add.onclick=addTabPrompt;bar.appendChild(add);
  var ed=document.createElement('button');ed.className='tab iconbtn'+(STATE.editTabs?' on':'');ed.textContent='✎';ed.title='タブを編集（並び替え/名前/削除）';
  ed.onclick=function(){STATE.editTabs=!STATE.editTabs;renderTabs();};bar.appendChild(ed);
  var hint=document.getElementById('tabhint');
  if(hint) hint.textContent=STATE.editTabs?'並び替え：◀ ▶ ／ 名前変更：タブをタップ ／ 削除：✕ ／ 終わったら ✎':'';
}
function mvBtn(t,fn){var b=document.createElement('button');b.className='mv';b.textContent=t;b.onclick=fn;return b;}

function addTabPrompt(){
  openInput('新しいタブ名', '', '例：勉強、健康', function(name){
    if(!name)return;
    var id=newId();
    STATE.tabs.push({id:id,name:name,type:'normal',order:STATE.tabs.length});
    STATE.active=id;STATE.editTabs=false;renderTabs();renderView();
    call('addTab',[id,name,'normal']).then(function(r){STATE.nodes=r.nodes;STATE.tabs=r.tabs;renderTabs();renderView();}).catch(failNote);
  });
}
function editTabName(t){
  openInput('タブ名を変更', t.name, '', function(name){
    if(!name||name===t.name)return;
    snap();
    t.name=name;renderTabs();
    call('renameTab',[t.id,name]).catch(failNote);
  });
}
function removeTab(t){
  var n=STATE.nodes.filter(function(x){return x.tab===t.id;}).length;
  openConfirm('タブ「'+t.name+'」を削除しますか？'+(n?'\n（中の '+n+' 項目も削除されます）':''), function(){
    snap();
    STATE.tabs=STATE.tabs.filter(function(x){return x.id!==t.id;});
    STATE.nodes=STATE.nodes.filter(function(x){return x.tab!==t.id;});
    if(STATE.active===t.id)STATE.active=(STATE.tabs[0]&&STATE.tabs[0].id)||DAILY;
    renderTabs();renderView();
    call('deleteTab',[t.id]).catch(failNote);
  });
}
function moveTab(i,dir){
  var j=i+dir;if(j<0||j>=STATE.tabs.length)return;
  var a=STATE.tabs;var tmp=a[i];a[i]=a[j];a[j]=tmp;
  a.forEach(function(t,k){t.order=k;});
  renderTabs();
  call('reorderTabs',[a.map(function(t){return t.id;})]).catch(failNote);
}

/* ===== ビュー ===== */
function renderView(){ if(STATE.shopping)renderShop(STATE.shopping); else if(STATE.active===SCHEDULE)renderSchedule(); else if(STATE.active===OVERVIEW)renderOverview(); else if(STATE.active===DAILY)renderDaily(); else renderTab(STATE.active); renderComposer(); }

function childrenOf(tabId,parentId){
  return STATE.nodes.filter(function(n){return n.tab===tabId&&n.parentId===parentId;})
    .sort(function(a,b){return a.order-b.order;});
}
function hasKids(n){return STATE.nodes.some(function(x){return x.parentId===n.id;});}

function renderTab(tabId){
  var t=STATE.tabs.filter(function(x){return x.id===tabId;})[0];
  if(!t){renderView2('');return;}
  var all=STATE.nodes.filter(function(n){return n.tab===tabId;});
  var doneN=all.filter(function(n){return n.done;}).length;
  var v=document.getElementById('view');
  var html='<div class="card"><div class="card-head"><div class="card-title">'+esc(t.name)+
    '<span class="en">'+(t.type==='work'?'work':'list')+'</span></div>'+
    '<div class="count">'+doneN+' / '+all.length+'</div></div>';
  if(t.name==='定期購入'){
    var nbuy=STATE.nodes.filter(function(n){return n.tab===tabId&&n.today&&!hasKids(n);}).length;
    html+='<div class="shoprow"><button class="shopopen" onclick="openShop(\''+jsq(tabId)+'\')">🛒 買い物リスト'+(nbuy?'（'+nbuy+'）':'')+'</button>'+
      '<span class="shophint">'+markIcon('today',true)+' を付けたものが買い物リストに入ります</span></div>';
  }
  html+='<div class="bulkbar"><span class="bl">タブ全体：</span>'+
    '<button onclick="bulkMark(\''+jsq(tabId)+'\',\'daily\')">'+markIcon('daily',true)+' 全部定期</button>'+
    '<button onclick="bulkMark(\''+jsq(tabId)+'\',\'today\')">'+markIcon('today',true)+' 全部その日</button>'+
    '<button onclick="bulkMark(\''+jsq(tabId)+'\',\'none\')">解除</button></div>';
  html+='<div class="tree" ondblclick="if(event.target===this)addRoot(\''+jsq(tabId)+'\')">'+renderKids(tabId,'',0)+'</div>';
  if(!all.length) html+='<div class="empty" ondblclick="addRoot(\''+jsq(tabId)+'\')">からっぽです<span class="sw">ここをダブルクリックで追加</span></div>';
  html+='<div class="addline"><button onclick="addRoot(\''+jsq(tabId)+'\')">＋ 中タブを追加</button></div>';
  html+='<div class="hint">行を<b>1タップ＝選択</b>／<b>もう1タップ＝編集</b>。入力・期限・追加・レベル(中/小/孫/孫の孫)は<b>下のバー</b>でまとめて操作。<br><b>⠿ドラッグ</b>：左寄せ＝同じ並び／<b>右寄せ＝その項目の中へ</b> ・ 右のマークで '+markIcon('daily',true)+'<b style="color:var(--gold)">定期</b>／'+markIcon('today',true)+'<b style="color:var(--rose)">その日</b> ・ … で移動/削除</div>';
  html+='</div>';
  v.innerHTML=html;
}

function renderKids(tabId,parentId,depth){
  var kids=childrenOf(tabId,parentId);
  if(!kids.length)return '';
  var h='';
  kids.forEach(function(n){
    h+=nodeRow(n,depth);
    if(hasKids(n)&&!n.collapsed) h+='<div class="kids">'+renderKids(tabId,n.id,depth+1)+'</div>';
  });
  return h;
}

function nodeRow(n,depth){
  var kids=hasKids(n);
  var cls='row'+(n.done?' done':'')+(STATE.selected===n.id?' sel':'')+(depth===0?' sec':depth===1?' sub':' d'+Math.min(depth,4));
  var h='<div class="'+cls+'" data-id="'+n.id+'">';
  h+='<div class="drag" title="ドラッグで移動" onpointerdown="dragStart(event,\''+jsq(n.id)+'\')"><svg viewBox="0 0 16 16" width="11" height="11"><g fill="currentColor"><circle cx="6" cy="3" r="1.3"/><circle cx="10" cy="3" r="1.3"/><circle cx="6" cy="8" r="1.3"/><circle cx="10" cy="8" r="1.3"/><circle cx="6" cy="13" r="1.3"/><circle cx="10" cy="13" r="1.3"/></g></svg></div>';
  h+='<div class="twist'+(kids?'':' empty')+'" onclick="toggleCollapse(\''+jsq(n.id)+'\')">'+(kids?(n.collapsed?'▶':'▼'):'•')+'</div>';
  h+='<div class="check'+(n.done?' on':'')+'" onclick="toggleDone(\''+jsq(n.id)+'\')"><svg viewBox="0 0 16 16"><polyline points="3,8.5 6.5,12 13,4"/></svg></div>';
  h+='<div class="label" title="1回タップ＝選択／もう1回＝編集" onclick="rowClick(\''+jsq(n.id)+'\')" ondblclick="rowDbl(\''+jsq(n.id)+'\')">'+linkify(n.text)+'</div>';
  if(n.note) h+='<span class="dl" title="期限">〆'+esc(n.note)+'</span>';
  h+='<button class="mk2 daily'+(n.daily?' on':'')+'" title="定期（毎日くりかえし）／もう一度で解除" onclick="setMark(\''+jsq(n.id)+'\',\'daily\')">'+markIcon('daily',n.daily)+'</button>';
  h+='<button class="mk2 today'+(n.today?' on':'')+'" title="その日にすること／もう一度で解除" onclick="setMark(\''+jsq(n.id)+'\',\'today\')">'+markIcon('today',n.today)+'</button>';
  h+='<button class="del" title="削除" onclick="removeNode(\''+jsq(n.id)+'\')">✕</button>';
  h+='<button class="menu'+(STATE.menuId===n.id?' on':'')+'" title="操作" onclick="toggleMenu(\''+jsq(n.id)+'\')">⋯</button>';
  h+='</div>';
  if(STATE.menuId===n.id){
    var tb='<div class="toolbar">';
    if(kids){ // この中（中タブ）をまとめて
      tb+='<button class="tbbulk" onclick="bulkMarkNode(\''+jsq(n.id)+'\',\'daily\')">'+markIcon('daily',true)+' 中ぜんぶ定期</button>'+
          '<button class="tbbulk" onclick="bulkMarkNode(\''+jsq(n.id)+'\',\'today\')">'+markIcon('today',true)+' 中ぜんぶその日</button>'+
          '<button class="tbbulk" onclick="bulkMarkNode(\''+jsq(n.id)+'\',\'none\')">中を解除</button>';
    }
    tb+='<button onclick="moveNode(\''+jsq(n.id)+'\',-1)">↑ 上へ</button>'+
       '<button onclick="moveNode(\''+jsq(n.id)+'\',1)">↓ 下へ</button>'+
       '</div>';
    h+=tb;
  }
  return h;
}
function toggleMenu(id){ STATE.menuId=(STATE.menuId===id?null:id); renderView(); }

/* ===== 元に戻す（Undo） ===== */
var UNDO=[];
function snap(){ // 変更の直前にノードだけ保存（タブは対象外＝Undoでタブを壊さない）
  UNDO.push(JSON.stringify(STATE.nodes));
  if(UNDO.length>40) UNDO.shift();
  var b=document.getElementById('undoBtn'); if(b) b.disabled=false;
}
function undo(){
  if(!UNDO.length){ toast('戻せる変更はありません'); return; }
  STATE.nodes=JSON.parse(UNDO.pop());           // ノードだけ復元（タブはそのまま）
  STATE.selected=null; STATE.editing=false; STATE.menuId=null;
  renderTabs(); renderView();
  call('restoreAll',[STATE.nodes]).catch(failNote);
  toast('元に戻しました');
  var b=document.getElementById('undoBtn'); if(b&&!UNDO.length) b.disabled=true;
}

/* ===== ノード操作 ===== */
function byId(id){return STATE.nodes.filter(function(n){return n.id===id;})[0];}
function siblings(n){return childrenOf(n.tab,n.parentId);}

function addRoot(tabId){ STATE.selected=null; STATE.editing=false; STATE.cLevel=0; setComposerInput(''); renderView(); focusComposerInput(); }
function endOrder(tabId,parentId){ var s=childrenOf(tabId,parentId);return s.length?s[s.length-1].order+1:0; }

// 取り残された空欄項目を一掃（編集中のものは除く）。サーバ側からも消す。
function cleanupEmptyNodes(){
  var dead=STATE.nodes.filter(function(n){ return !n.text; });
  if(!dead.length) return;
  var ids={}; dead.forEach(function(n){ ids[n.id]=true; });
  STATE.nodes=STATE.nodes.filter(function(n){ return !ids[n.id]; });
  STATE.todayChecks=STATE.todayChecks.filter(function(t){ return !ids[t]; });
  dead.forEach(function(n){ call('deleteNode',[n.id]).catch(function(){}); });
}
// タブ切替時：編集中なら確定（空なら削除）し、空欄を一掃してから切替
function switchTab(id){
  commitComposer();
  STATE.selected=null; STATE.editing=false;
  cleanupEmptyNodes();
  STATE.shopping=null;
  STATE.active=id; renderTabs(); renderView();
}

/* ===== 買い物リスト（定期購入向け：◆店ごと）===== */
function openShop(tabId){ commitComposer(); STATE.selected=null; STATE.editing=false; cleanupEmptyNodes(); STATE.shopping=tabId; STATE.menuId=null; renderView(); syncShop(tabId); }
function closeShop(){ STATE.shopping=null; renderView(); }
// 買い物リストをスプレッドシート「買い物リスト」へ書き出し（Cowork等が読める形）
var _shopSyncT=null;
function syncShop(tabId){ // 変更を少し待ってから自動で書き出し（連打をまとめる）
  clearTimeout(_shopSyncT);
  _shopSyncT=setTimeout(function(){ call('exportShoppingList',[tabId]).catch(function(){}); },600);
}
function exportShop(tabId){ // 手動で今すぐ書き出し
  toast('書き出し中…');
  call('exportShoppingList',[tabId]).then(function(r){
    toast('スプレッドシートに書き出しました（'+r.count+'件）');
  }).catch(failNote);
}
function shopGroups(tabId){
  var groups=[];
  childrenOf(tabId,'').forEach(function(cat){          // 各 ◆店
    var list=[];
    (function walk(pid){
      childrenOf(tabId,pid).forEach(function(n){
        if(hasKids(n)) walk(n.id); else if(n.today) list.push(n);
      });
    })(cat.id);
    if(!hasKids(cat)&&cat.today) list.push(cat);
    if(list.length) groups.push({cat:cat, list:list});
  });
  return groups;
}
function renderShop(tabId){
  var t=STATE.tabs.filter(function(x){return x.id===tabId;})[0];
  var items=STATE.nodes.filter(function(n){return n.tab===tabId&&n.today&&!hasKids(n);});
  var total=items.length, bought=items.filter(function(n){return n.done;}).length;
  var v=document.getElementById('view');
  var html='<div class="card">';
  html+='<div class="card-head"><div class="card-title">🛒 買い物リスト<span class="en">'+esc(t?t.name:'')+'</span></div>'+
    '<div class="count">'+bought+' / '+total+'</div></div>';
  html+='<div class="shopbar"><button class="tbtn" onclick="closeShop()">← 戻る</button>'+
    '<button class="tbtn" onclick="exportShop(\''+jsq(tabId)+'\')">📤 書き出す</button>'+
    (bought?'<button class="tbtn" onclick="clearBought(\''+jsq(tabId)+'\')">買ったものを片付ける（'+bought+'）</button>':'')+'</div>';
  if(!total){
    html+='<div class="empty">買うものが選ばれていません<span class="sw">定期購入で '+markIcon('today',true)+' を付けてください</span></div>';
  }else{
    shopGroups(tabId).forEach(function(g){
      html+='<div class="group-label">'+linkify(g.cat.text)+'</div>';
      g.list.forEach(function(n){
        var on=n.done;
        html+='<div class="dchk'+(on?' done':'')+'">'+
          '<div class="check'+(on?' on':'')+'" onclick="toggleBought(\''+jsq(n.id)+'\')"><svg viewBox="0 0 16 16"><polyline points="3,8.5 6.5,12 13,4"/></svg></div>'+
          '<span class="t">'+linkify(n.text)+'</span></div>';
      });
    });
  }
  html+='<div class="hint">家で '+markIcon('today',true)+' を付けたものがここに並びます。買ったらタップでチェック → 「買ったものを片付ける」でリストから外せます。</div>';
  html+='</div>';
  v.innerHTML=html;
}
function toggleBought(id){ var n=byId(id);if(!n)return; snap(); n.done=!n.done; renderView();
  call('updateNode',[id,'done',n.done]).catch(failNote);
  syncShop(n.tab);
  var items=STATE.nodes.filter(function(x){return x.tab===n.tab&&x.today&&!hasKids(x);});
  if(items.length&&items.every(function(x){return x.done;})) toast('ぜんぶ買えました ✦');
}
function clearBought(tabId){
  var bought=STATE.nodes.filter(function(n){return n.tab===tabId&&n.today&&!hasKids(n)&&n.done;});
  if(!bought.length){ toast('チェック済みがありません'); return; }
  snap();
  bought.forEach(function(n){ n.today=false; n.done=false; });
  renderView();
  bought.forEach(function(n){ call('updateNode',[n.id,'today',false]).catch(failNote); call('updateNode',[n.id,'done',false]).catch(failNote); });
  syncShop(tabId);
  toast(bought.length+'件を片付けました');
}

/* ===== 概要（ToDoOverview シートを表示）===== */
function openOverview(){ commitComposer(); STATE.selected=null; STATE.editing=false; cleanupEmptyNodes(); STATE.shopping=null; STATE.active=OVERVIEW; STATE.menuId=null; renderTabs(); renderOverview(); }
function loadOverview(){
  call('getOverview',[]).then(function(d){ STATE.overview=d||{empty:true}; if(STATE.active===OVERVIEW) renderOverview(); })
    .catch(function(){ STATE.overview={empty:true,err:true}; if(STATE.active===OVERVIEW) renderOverview(); });
}
function renderOverview(){
  var v=document.getElementById('view'), d=STATE.overview;
  if(!d){ v.innerHTML='<div class="loading">よみこみ中…</div>'; loadOverview(); return; }
  var html='<div class="card"><div class="card-head"><div class="card-title">📋 概要<span class="en">overview</span></div>'+
    '<button class="tbtn" onclick="STATE.overview=null;renderOverview();">↻ 更新</button></div>';
  if(d.empty){
    html+='<div class="empty">「ToDoOverview」シートがまだありません'+
      '<span class="sw">Coworkに「ToDoメモのスプレッドシートに『ToDoOverview』シートを作って書き込んで」と頼んでください</span></div>';
  }else{
    var rows=d.rows||[], maxc=0; rows.forEach(function(r){ if(r.length>maxc) maxc=r.length; });
    if(maxc<=1){
      html+='<div class="ovtext">';
      rows.forEach(function(r){ var t=(r[0]||'').trim(); html+= t? '<p>'+linkify(t)+'</p>' : '<div class="ovsp"></div>'; });
      html+='</div>';
    }else{
      html+='<div class="ovwrap"><table class="ovtable">';
      rows.forEach(function(r,ri){
        html+='<tr>';
        for(var c=0;c<maxc;c++){ var cell=r[c]||''; html+= (ri===0?'<th>'+esc(cell)+'</th>':'<td>'+linkify(cell)+'</td>'); }
        html+='</tr>';
      });
      html+='</table></div>';
    }
  }
  html+='<div class="hint">Cowork等が「ToDoOverview」シートに書いた内容を表示しています（読み取り専用）。↻更新で最新に。</div>';
  html+='</div>';
  v.innerHTML=html;
}

/* ===== 予定（ToDoスケジュール の日付タブを表示）===== */
function openSchedule(){ commitComposer(); STATE.selected=null; STATE.editing=false; cleanupEmptyNodes(); STATE.shopping=null; STATE.active=SCHEDULE; STATE.menuId=null; STATE.scheduleDate=STATE.today; STATE.schedule=null; renderTabs(); renderSchedule(); }
function loadSchedule(){
  call('getSchedule',[STATE.scheduleDate||STATE.today]).then(function(d){ STATE.schedule=d||{empty:true}; if(STATE.active===SCHEDULE) renderSchedule(); })
    .catch(function(){ STATE.schedule={empty:true,err:true}; if(STATE.active===SCHEDULE) renderSchedule(); });
}
function pickScheduleDate(date){ STATE.scheduleDate=date; STATE.schedule=null; renderSchedule(); }
function makeSchedule(){
  toast('予定を作成中…');
  call('generateSchedule',[{date:STATE.today}]).then(function(d){
    STATE.schedule=d; STATE.scheduleDate=(d&&d.date)||STATE.today;
    if(STATE.active===SCHEDULE) renderSchedule();
    toast('今日の予定を立てました');
  }).catch(failNote);
}
function renderSchedule(){
  var v=document.getElementById('view'), d=STATE.schedule;
  if(!d){ v.innerHTML='<div class="loading">よみこみ中…</div>'; loadSchedule(); return; }
  var date=d.date||STATE.scheduleDate||STATE.today;
  var html='<div class="card"><div class="card-head"><div class="card-title">📅 予定<span class="en">'+esc(date)+'</span></div>'+
    '<button class="tbtn" onclick="STATE.schedule=null;renderSchedule();">↻ 更新</button></div>';
  html+='<div class="shoprow"><button class="shopopen" onclick="makeSchedule()">✨ 今日の予定を立てる</button>'+
    '<span class="shophint">❀を付けた今日のタスクを、方針の優先順位で時間割にします</span></div>';
  var dates=d.dates||[];
  if(dates.length){
    html+='<div class="datebar">';
    dates.forEach(function(dt){ html+='<button class="chip'+(dt===date?' on':'')+'" onclick="pickScheduleDate(\''+jsq(dt)+'\')">'+esc(dt.slice(5))+'</button>'; });
    html+='</div>';
  }
  if(d.empty){
    html+='<div class="empty">'+esc(date)+' の予定はまだありません'+
      '<span class="sw">上の「✨ 今日の予定を立てる」を押すと、自動で作成します</span></div>';
    if(d.url) html+='<div class="hint">保存先：<a href="'+esc(d.url)+'" target="_blank" rel="noopener">ToDoスケジュール を開く</a></div>';
  }else{
    var rows=d.rows||[], maxc=0; rows.forEach(function(r){ if(r.length>maxc) maxc=r.length; });
    if(maxc<=1){
      html+='<div class="ovtext">'; rows.forEach(function(r){ var t=(r[0]||'').trim(); html+= t?'<p>'+linkify(t)+'</p>':'<div class="ovsp"></div>'; }); html+='</div>';
    }else{
      html+='<div class="ovwrap"><table class="ovtable">';
      rows.forEach(function(r,ri){ html+='<tr>'; for(var c=0;c<maxc;c++){ var cell=r[c]||''; html+= ri===0?'<th>'+esc(cell)+'</th>':'<td>'+linkify(cell)+'</td>'; } html+='</tr>'; });
      html+='</table></div>';
    }
    html+='<div class="hint">アプリが方針の優先順位で立てた予定です。「✨今日の予定を立てる」でやり直し ／ ↻更新で再読込。「ToDoスケジュール」スプレッドシートにも保存されます。</div>';
  }
  html+='</div>';
  v.innerHTML=html;
}

// ノードを1つ作る（テキスト必須＝空は作らない）。idを返す。描画は呼び出し側。
function createNode(tabId,parentId,order,text){
  snap();
  var id=newId();
  STATE.nodes.push({id:id,tab:tabId,parentId:parentId,text:text||'',order:order,done:false,collapsed:false,daily:false,today:false,note:''});
  call('addNode',[id,tabId,parentId,order,text||'']).catch(failNote);
  return id;
}

/* ===== 行の選択・編集（1クリック選択／2クリック編集）===== */
var _clk=null;
function rowClick(id){ if(_clk){clearTimeout(_clk);_clk=null;} _clk=setTimeout(function(){_clk=null;doRowClick(id);},200); }
function rowDbl(id){
  if(_clk){clearTimeout(_clk);_clk=null;}
  if(STATE.editing && STATE.selected===id){ commitComposer(); return; } // 編集中のダブルクリック＝確定
  beginEdit(id);                                                        // それ以外＝選択して即編集
}
function doRowClick(id){
  if(STATE.editing){ var same=(STATE.selected===id); commitComposer(); if(same){ return; } } // 入力後の他クリック＝確定
  if(STATE.selected===id && !STATE.editing){ beginEdit(id); return; }   // 2回目＝編集へ
  selectRow(id);                                                        // 1回目＝選択
}
function selectRow(id){
  var n=byId(id); if(!n) return;
  STATE.selected=id; STATE.editing=false; STATE.menuId=null;
  STATE.cLevel=Math.min(depthOf(n),3);
  setComposerInput(''); setComposerDeadline(''); renderView();
}
function beginEdit(id){
  var n=byId(id); if(!n) return;
  STATE.selected=id; STATE.editing=true; STATE.menuId=null;
  STATE.cLevel=Math.min(depthOf(n),3);
  setComposerInput(n.text); setComposerDeadline(n.note); renderView(); focusComposerInput();
}
function depthOf(n){ var d=0,cur=n,g=0; while(cur&&cur.parentId&&g++<30){ cur=byId(cur.parentId); if(!cur)break; d++; } return d; }

/* ===== ドラッグで並べ替え（マウス＆タッチ：Pointer Events）===== */
function isDescendant(maybeChildId, ancestorId){
  var cur=byId(maybeChildId), guard=0;
  while(cur && cur.parentId && guard++<60){ if(cur.parentId===ancestorId) return true; cur=byId(cur.parentId); }
  return false;
}
function clearDrop(){ var e=document.querySelectorAll('.drop-after,.drop-into'); for(var i=0;i<e.length;i++){ e[i].classList.remove('drop-after'); e[i].classList.remove('drop-into'); } }
function dragStart(e, id){
  if(STATE.editing) return;
  e.preventDefault();
  var src=document.querySelector('.row[data-id="'+id+'"]'); if(src) src.classList.add('dragsrc');
  document.body.classList.add('dragging');
  var target=null, mode='after';
  function move(ev){
    if(ev.cancelable) ev.preventDefault();
    var p = ev.touches?ev.touches[0]:ev;
    var el=document.elementFromPoint(p.clientX, p.clientY);
    var row = el && el.closest ? el.closest('.row') : null;
    clearDrop();
    if(row && row.getAttribute('data-id') && row.getAttribute('data-id')!==id){
      target=row.getAttribute('data-id');
      var rect=row.getBoundingClientRect();
      mode = (p.clientX > rect.left + rect.width*0.5) ? 'into' : 'after';  // 右寄り＝中へ／左寄り＝同じ並び
      row.classList.add(mode==='into'?'drop-into':'drop-after');
    } else target=null;
  }
  function up(){
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    document.body.classList.remove('dragging'); clearDrop();
    if(src) src.classList.remove('dragsrc');
    if(target) dropMove(id, target, mode);
  }
  document.addEventListener('pointermove',move,{passive:false});
  document.addEventListener('pointerup',up);
}
function dropMove(dragId, targetId, mode){
  var d=byId(dragId), t=byId(targetId);
  if(!d||!t||dragId===targetId) return;
  if(isDescendant(targetId, dragId)){ toast('その中には移動できません'); return; }
  snap();
  if(mode==='into'){                      // 中へ＝tの子（最後）にする
    t.collapsed=false;
    d.parentId=t.id; d.order=endOrder(t.tab,t.id);
    call('updateNode',[t.id,'collapsed',false]).catch(failNote);
  } else {                                // 同じ並び＝tの直後
    d.parentId=t.parentId; d.order=t.order+0.5;
  }
  renderView();
  call('applyMoves',[[{id:d.id, parentId:d.parentId, order:d.order}]]).catch(failNote);
  reflow(d.tab, d.parentId);
}

/* ===== 下部入力バー（コンポーザ）===== */
function setComposerInput(v){ var i=document.getElementById('cmpinput'); if(i) i.value=v||''; }
function setComposerDeadline(v){ var i=document.getElementById('cmpdl'); if(i) i.value=v||''; }
function focusComposerInput(){ setTimeout(function(){ var i=document.getElementById('cmpinput'); if(i){ i.focus(); var l=i.value.length; i.setSelectionRange(l,l); } },30); }
function cmpKey(e){ if(e.key==='Enter'){ e.preventDefault(); composerSubmit(); } else if(e.key==='Escape'){ clearSelection(); } }
function setCLevel(l){ STATE.cLevel=l; renderComposer(); }
function clearSelection(){ STATE.selected=null; STATE.editing=false; setComposerInput(''); setComposerDeadline(''); renderView(); }
function commitComposer(){ if(STATE.editing) composerSubmit(); }
// レベル変更：絶対の深さ(0=中タブ/1=小タブ/2=孫)に合わせて字下げ/字上げ（描画なし）
function doIndentSilent(n){
  var sib=siblings(n); var i=sib.indexOf(n); if(i<=0) return;
  var prev=sib[i-1]; prev.collapsed=false;
  n.parentId=prev.id; n.order=endOrder(n.tab,prev.id);
  call('applyMoves',[[{id:n.id,parentId:n.parentId,order:n.order}]]).then(function(){return call('updateNode',[prev.id,'collapsed',false]);}).catch(failNote);
}
function doOutdentSilent(n){
  if(!n.parentId) return; var parent=byId(n.parentId); if(!parent) return;
  n.parentId=parent.parentId; n.order=parent.order+0.5;
  call('applyMoves',[[{id:n.id,parentId:n.parentId,order:n.order}]]).catch(failNote);
  reflow(n.tab,n.parentId);
}
function applyLevel(n, target){
  var g=0;
  while(depthOf(n)<target && g++<8){ var p=n.parentId; doIndentSilent(n); if(n.parentId===p) break; }
  g=0;
  while(depthOf(n)>target && g++<8){ var p2=n.parentId; doOutdentSilent(n); if(n.parentId===p2) break; }
}
function removeNodeSilent(id){
  var kill={};(function col(x){kill[x]=true;STATE.nodes.filter(function(c){return c.parentId===x;}).forEach(function(c){col(c.id);});})(id);
  STATE.nodes=STATE.nodes.filter(function(x){return !kill[x.id];});
  STATE.todayChecks=STATE.todayChecks.filter(function(t){return !kill[t];});
  call('deleteNode',[id]).catch(failNote);
}
function composerSubmit(){
  var inp=document.getElementById('cmpinput'); var text=inp?inp.value.trim():'';
  var dli=document.getElementById('cmpdl'); var dl=dli?dli.value.trim():'';
  if(STATE.editing && STATE.selected){           // ── 編集の確定 ──
    var n=byId(STATE.selected);
    if(!n){ clearSelection(); return; }
    if(!text){ snap(); removeNodeSilent(n.id); STATE.selected=null; STATE.editing=false; renderView(); return; }
    snap();
    if(text!==n.text){ n.text=text; call('updateNode',[n.id,'text',text]).catch(failNote); }
    if(dl!==(n.note||'')){ n.note=dl; call('updateNode',[n.id,'note',dl]).catch(failNote); }  // 期限はnoteに保存
    applyLevel(n, STATE.cLevel);
    STATE.editing=false; setComposerInput(''); setComposerDeadline(''); renderView();
    return;
  }
  // ── 追加 ──
  if(!text){ focusComposerInput(); return; }
  var tabId=STATE.active;
  var sel=STATE.selected?byId(STATE.selected):null;
  var nid;
  if(!sel){ nid=createNode(tabId,'',endOrder(tabId,''),text); }
  else {
    nid=createNode(tabId, sel.parentId, sel.order+0.5, text);
    reflow(tabId, sel.parentId);
    var nn=byId(nid); if(nn) applyLevel(nn, STATE.cLevel);
  }
  if(dl){ var cn=byId(nid); if(cn){ cn.note=dl; call('updateNode',[nid,'note',dl]).catch(failNote); } }
  STATE.selected=nid; STATE.editing=false;
  setComposerInput(''); setComposerDeadline(''); renderView(); focusComposerInput();
}
function renderComposer(){
  var c=document.getElementById('composer'); if(!c) return;
  var inTab = !STATE.shopping && STATE.active!==DAILY && STATE.active!==OVERVIEW && STATE.active!==SCHEDULE
    && STATE.tabs.some(function(t){return t.id===STATE.active;});
  document.body.classList.toggle('has-composer', inTab);
  if(!inTab){ c.style.display='none'; return; }
  c.style.display='block';
  var sel=STATE.selected?byId(STATE.selected):null;
  var info=document.getElementById('cmpsel');
  if(info){
    if(STATE.editing && sel) info.innerHTML='✎ 編集中：'+esc(sel.text)+' <button class="cmpx" onclick="clearSelection()">×</button>';
    else if(sel) info.innerHTML='選択中：'+esc(sel.text)+'（この下に追加）<button class="cmpx" onclick="clearSelection()">×</button>';
    else info.innerHTML='未選択（中タブとして末尾に追加）';
  }
  var chips=c.querySelectorAll('.clv');
  for(var i=0;i<chips.length;i++){ chips[i].classList.toggle('on', Number(chips[i].getAttribute('data-l'))===STATE.cLevel); }
  var go=document.getElementById('cmpgo'); if(go) go.textContent=STATE.editing?'確定':'＋ 追加';
  var inp=document.getElementById('cmpinput'); if(inp) inp.placeholder=STATE.editing?'内容を編集':'追加する内容を入力';
}

function toggleDone(id){var n=byId(id);if(!n)return;snap();n.done=!n.done;renderView();call('updateNode',[id,'done',n.done]).catch(failNote);}
function toggleCollapse(id){var n=byId(id);if(!n||!hasKids(n))return;n.collapsed=!n.collapsed;renderView();call('updateNode',[id,'collapsed',n.collapsed]).catch(failNote);}
// マークを切替：定期(★)↔その日(❀)は排他。インラインは none→定期→その日→none を巡回。
function setMark(id,kind){
  var n=byId(id);if(!n)return;
  snap();
  if(kind==='daily'){ n.daily=!n.daily; if(n.daily)n.today=false; }
  else { n.today=!n.today; if(n.today)n.daily=false; }
  STATE.menuId=null; renderView();
  call('updateNode',[id,'daily',n.daily]).catch(failNote);
  call('updateNode',[id,'today',n.today]).catch(failNote);
  toast(n.daily?'★定期に入れました':n.today?'❀その日に入れました':'マークを外しました');
}
function cycleMark(id){
  var n=byId(id);if(!n)return;
  snap();
  var next = (!n.daily&&!n.today)?'daily' : (n.daily?'today':'none');
  n.daily=(next==='daily'); n.today=(next==='today'); renderView();
  call('updateNode',[id,'daily',n.daily]).catch(failNote);
  call('updateNode',[id,'today',n.today]).catch(failNote);
  toast(n.daily?'★定期に入れました':n.today?'❀その日に入れました':'マークを外しました');
}
// 中タブ（ある項目の中）を一括：その項目の子孫の葉すべてに ★/❀ を付ける・解除。
function bulkMarkNode(id,kind){
  var node=byId(id); if(!node) return;
  var leaves=[];
  (function walk(pid){
    STATE.nodes.filter(function(n){return n.parentId===pid;})
      .sort(function(a,b){return a.order-b.order;})
      .forEach(function(n){ if(hasKids(n)) walk(n.id); else leaves.push(n); });
  })(id);
  if(!leaves.length){ toast('この中に項目がありません'); return; }
  var label=kind==='daily'?'★定期':kind==='today'?'❀その日':'解除';
  openConfirm('「'+(node.text||'(空)')+'」の中の '+leaves.length+' 項目をすべて '+label+' にしますか？', function(){
    snap();
    leaves.forEach(function(n){ n.daily=(kind==='daily'); n.today=(kind==='today'); });
    STATE.menuId=null; renderView();
    call('bulkSetMark',[leaves.map(function(n){return n.id;}),kind]).then(function(){
      toast(label+'：'+leaves.length+'件にしました');
    }).catch(failNote);
  });
}

// タブ全体を一括選択：そのタブの「項目（子を持たない葉）」すべてに ★/❀ を付ける・解除。
function bulkMark(tabId,kind){
  var leaves=STATE.nodes.filter(function(n){return n.tab===tabId&&!hasKids(n);});
  if(!leaves.length){ toast('項目がありません'); return; }
  var label=kind==='daily'?'★定期':kind==='today'?'❀その日':'解除';
  openConfirm('「'+tabName(tabId)+'」の '+leaves.length+' 項目をすべて '+label+' にしますか？', function(){
    snap();
    leaves.forEach(function(n){ n.daily=(kind==='daily'); n.today=(kind==='today'); });
    renderView();
    call('bulkSetMark',[leaves.map(function(n){return n.id;}),kind]).then(function(){
      toast(label+'：'+leaves.length+'件にしました');
    }).catch(failNote);
  });
}

function moveNode(id,dir){
  var n=byId(id);if(!n)return;var sib=siblings(n);var i=sib.indexOf(n);var j=i+dir;
  if(j<0||j>=sib.length)return;
  snap();
  var a=sib[i].order, b=sib[j].order; sib[i].order=b; sib[j].order=a;
  renderView();
  call('applyMoves',[[{id:sib[i].id,order:sib[i].order},{id:sib[j].id,order:sib[j].order}]]).catch(failNote);
}
function indentNode(id){var n=byId(id);if(n)doIndent(n);}
function outdentNode(id){var n=byId(id);if(n)doOutdent(n);}
function doIndent(n){
  var sib=siblings(n);var i=sib.indexOf(n);if(i<=0)return; // 直前の兄弟の子になる
  snap();
  var prev=sib[i-1]; prev.collapsed=false;
  n.parentId=prev.id; n.order=endOrder(n.tab,prev.id);
  renderView();
  call('applyMoves',[[{id:n.id,parentId:n.parentId,order:n.order}]]).then(function(){return call('updateNode',[prev.id,'collapsed',false]);}).catch(failNote);
}
function doOutdent(n){
  if(!n.parentId)return; var parent=byId(n.parentId);if(!parent)return; // 親の兄弟になる
  snap();
  n.parentId=parent.parentId; n.order=parent.order+0.5;
  renderView(); reflow(n.tab,n.parentId);
  call('applyMoves',[[{id:n.id,parentId:n.parentId,order:n.order}]]).catch(failNote);
}
// 並び順の小数を整数に均す（任意・サーバにも反映）
function reflow(tabId,parentId){
  var s=childrenOf(tabId,parentId);var ups=[];
  s.forEach(function(x,k){ if(x.order!==k){x.order=k;ups.push({id:x.id,order:k});} });
  if(ups.length) call('applyMoves',[ups]).catch(function(){});
}
function removeNode(id){
  var n=byId(id);if(!n)return;
  var kids=hasKids(n);
  openConfirm('「'+(n.text||'(空)')+'」'+(kids?'と、その中身も':'')+'を削除しますか？', function(){
    snap();
    var kill={};(function col(x){kill[x]=true;STATE.nodes.filter(function(c){return c.parentId===x;}).forEach(function(c){col(c.id);});})(id);
    STATE.nodes=STATE.nodes.filter(function(x){return !kill[x.id];});
    STATE.todayChecks=STATE.todayChecks.filter(function(t){return !kill[t];});
    STATE.menuId=null;
    renderView();
    call('deleteNode',[id]).catch(failNote);
  });
}

/* ===== 今日のチェック ===== */
function pathOf(n){ // 祖先のテキストを「タブ › 親 › …」で
  var parts=[];var cur=n;var guard=0;
  while(cur&&cur.parentId&&guard++<20){var p=byId(cur.parentId);if(!p)break;parts.unshift(p.text);cur=p;}
  parts.unshift(tabName(n.tab));
  return parts.filter(Boolean).join(' › ');
}
function isFlagged(n){ return n.daily||n.today; }
function dailyDone(n){ return n.daily ? STATE.todayChecks.indexOf(n.id)>=0 : !!n.done; }
function subtreeHasFlag(n){ if(isFlagged(n))return true; return STATE.nodes.some(function(c){return c.parentId===n.id&&subtreeHasFlag(c);}); }
function renderDaily(){
  var flagged=STATE.nodes.filter(isFlagged);
  var total=flagged.length;
  var doneN=flagged.filter(dailyDone).length;
  var pct=total?Math.round(doneN/total*100):0;
  var msg=total===0?'まだマークした項目がありません':doneN===total?'すべて完了！おつかれさまでした':'あと '+(total-doneN)+' 件です';
  var v=document.getElementById('view');
  var html='<div class="card"><div class="card-head"><div class="card-title">今日のチェック<span class="en">today\'s check</span></div>'+
    '<div class="count">'+doneN+' / '+total+'</div></div>';
  html+='<div class="progress"><div class="ring" style="--p:'+pct+'"><i>'+pct+'%</i></div>'+
    '<div class="pmsg">'+esc(msg)+'<small>各項目のマークを押すと、ここに集まります</small></div></div>';
  html+='<div class="legend"><span>'+markIcon('daily',true)+' 定期（毎日リセット）</span><span>'+markIcon('today',true)+' その日（一度きり）</span></div>';
  if(total===0){
    html+='<div class="empty">項目の右の ☆ を押して ★定期 / ❀その日 を付けてください<span class="sw">tap a mark ☆</span></div>';
  }else{
    STATE.tabs.forEach(function(t){
      if(!STATE.nodes.some(function(n){return n.tab===t.id&&isFlagged(n);}))return;
      html+='<div class="group-label">'+esc(t.name)+'</div>'+renderDailyTree(t.id,'',0);
    });
  }
  html+='</div>';
  v.innerHTML=html;
}
function renderDailyTree(tabId,parentId,depth){
  var kids=childrenOf(tabId,parentId);
  var h='';
  kids.forEach(function(n){
    if(!subtreeHasFlag(n))return;
    if(isFlagged(n)) h+=dailyCheckRow(n);
    else h+='<div class="dctx s'+Math.min(depth,1)+'">'+linkify(n.text)+'</div>';
    var sub=renderDailyTree(tabId,n.id,depth+1);
    if(sub) h+='<div class="dkids">'+sub+'</div>';
  });
  return h;
}
function dailyCheckRow(n){
  var on=dailyDone(n);
  var ico=n.daily?'<span class="ico daily">'+markIcon('daily',true)+'</span>':'<span class="ico today">'+markIcon('today',true)+'</span>';
  return '<div class="dchk'+(on?' done':'')+'">'+
    '<div class="check'+(on?' on':'')+'" onclick="toggleDailyCheck(\''+jsq(n.id)+'\')"><svg viewBox="0 0 16 16"><polyline points="3,8.5 6.5,12 13,4"/></svg></div>'+
    ico+'<span class="t">'+linkify(n.text)+'</span></div>';
}
function toggleDailyCheck(id){
  var n=byId(id);if(!n)return;
  if(n.daily){
    var i=STATE.todayChecks.indexOf(id);var now=i<0;
    if(now)STATE.todayChecks.push(id);else STATE.todayChecks.splice(i,1);
    call('setDailyCheck',[id,STATE.today,now]).catch(failNote);
  }else{
    n.done=!n.done;
    call('updateNode',[id,'done',n.done]).catch(failNote);
  }
  renderDaily();
  var flagged=STATE.nodes.filter(isFlagged);
  if(flagged.length&&flagged.every(dailyDone)) toast('すべて完了！おつかれさまでした ✦');
}

/* ===== 補助 ===== */
function renderView2(h){document.getElementById('view').innerHTML=h;}
function failNote(){toast('保存に失敗しました');}
var _tt;function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},2200);}
function pad2(n){return (n<10?'0':'')+n;}
function newId(){return 'C'+Date.now().toString(36)+Math.floor(Math.random()*1e6).toString(36);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function jsq(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ===== 手書き線画マーク ===== */
// kind:'daily'（定期＝きらめき）/'today'（その日＝小花）。on で色づく・offは淡いグレー。
function markIcon(kind,on){
  var col=kind==='daily'?'#c8a24e':'#c98a93';
  var st=on?col:'currentColor', fl=on?col:'none', fo=on?(kind==='daily'?0.16:0.13):0;
  if(kind==='daily'){
    return '<svg class="mki" viewBox="0 0 24 24" fill="'+fl+'" fill-opacity="'+fo+'" stroke="'+st+'">'+
      '<path d="M12 3.4C12.5 8.1 12.9 8.5 17.6 9C12.9 9.5 12.5 9.9 12 14.6C11.5 9.9 11.1 9.5 6.4 9C11.1 8.5 11.5 8.1 12 3.4Z"/></svg>';
  }
  var pet='<ellipse cx="12" cy="7.7" rx="1.8" ry="3.1"/>';
  return '<svg class="mki" viewBox="0 0 24 24" fill="'+fl+'" fill-opacity="'+fo+'" stroke="'+st+'">'+
    pet+'<g transform="rotate(72 12 12)">'+pet+'</g><g transform="rotate(144 12 12)">'+pet+'</g>'+
    '<g transform="rotate(216 12 12)">'+pet+'</g><g transform="rotate(288 12 12)">'+pet+'</g>'+
    '<circle cx="12" cy="12" r="1.4" fill="'+st+'" stroke="none"/></svg>';
}

/* ===== 印刷 ===== */
function doPrint(scope){
  var tabs=(scope==='tab'&&STATE.active!==DAILY)
    ? STATE.tabs.filter(function(t){return t.id===STATE.active;}) : STATE.tabs;
  var html='';
  tabs.forEach(function(t){ html+='<section class="psec"><h2>'+esc(t.name)+'</h2>'+printKids(t.id,'')+'</section>'; });
  if(!html) html='<p>印刷できる項目がありません。</p>';
  document.getElementById('printArea').innerHTML=
    '<div class="phead"><div class="pbrand">memo<span>.</span></div>'+
    '<div class="pmeta">'+esc(document.getElementById('todayLabel').textContent)+'</div></div>'+html;
  closeModal();
  setTimeout(function(){ window.print(); },80);
}
function printKids(tabId,parentId){
  var kids=childrenOf(tabId,parentId);
  if(!kids.length) return '';
  var h='<ul class="ptree">';
  kids.forEach(function(n){
    var box=n.done?'☑':'☐';
    var mk=n.daily?'<span class="pmk pd">定期</span>':n.today?'<span class="pmk pt">その日</span>':'';
    h+='<li><span class="pbox">'+box+'</span><span class="ptx'+(n.done?' pdone':'')+'">'+linkify(n.text)+'</span>'+mk+printKids(tabId,n.id)+'</li>';
  });
  return h+'</ul>';
}

/* ===== 保存（ドキュメント／スプレッドシート）とモーダル ===== */
// アプリ内テキスト入力（ブラウザのprompt＝URLが出るダイアログの代わり）
function openInput(title, value, placeholder, onok){
  STATE._oninput=onok;
  document.getElementById('modalBox').innerHTML='<div class="mtitle">'+esc(title)+'</div>'+
    '<input class="minput" id="minput" value="'+esc(value||'')+'" placeholder="'+esc(placeholder||'')+'" maxlength="40">'+
    '<div class="mdesc" style="margin:2px 0 12px">入力欄を2回タップ／Enterで確定</div>'+
    '<button class="mbtn rec" onclick="okInput()">決定</button>'+
    '<button class="mlink" onclick="closeModal()">キャンセル</button>';
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){
    var i=document.getElementById('minput'); if(!i)return;
    i.focus(); i.select();
    i.onkeydown=function(e){ if(e.key==='Enter'){e.preventDefault();okInput();} else if(e.key==='Escape'){closeModal();} };
    var last=0;  // タッチでも効く「2回タップで確定」
    i.onclick=function(){ var now=Date.now(); if(now-last<400){ okInput(); } last=now; };
  },40);
}
function okInput(){
  var i=document.getElementById('minput'); if(!i)return;
  var v=i.value.trim(), fn=STATE._oninput;
  STATE._oninput=null; closeModal();
  if(fn) fn(v);
}
// アプリ内の確認ダイアログ（ブラウザのconfirm＝URLが出るダイアログの代わり）
function openConfirm(message, onok){
  STATE._onok=onok;
  document.getElementById('modalBox').innerHTML=
    '<div class="mdesc" style="font-size:14px;margin-bottom:16px">'+esc(message).replace(/\n/g,'<br>')+'</div>'+
    '<button class="mbtn rec" onclick="okConfirm()">はい</button>'+
    '<button class="mlink" onclick="closeModal()">キャンセル</button>';
  document.getElementById('modal').classList.add('open');
}
function okConfirm(){ var fn=STATE._onok; STATE._onok=null; closeModal(); if(fn) fn(); }

function openModal(kind){
  if(!STATE.saveScope) STATE.saveScope='tab';
  var box=document.getElementById('modalBox');
  var canTab=STATE.active!==DAILY && !!tabName(STATE.active);
  var curName=canTab?tabName(STATE.active):'';
  if(!canTab) STATE.saveScope='all';
  if(kind==='print'){
    box.innerHTML='<div class="mtitle">印刷</div><div class="mdesc">印刷する範囲を選んでください。</div>'+
      (canTab?'<button class="mbtn" onclick="doPrint(\'tab\')">このタブだけ（'+esc(curName)+'）</button>':'')+
      '<button class="mbtn" onclick="doPrint(\'all\')">全タブまとめて</button>'+
      '<button class="mlink" onclick="closeModal()">閉じる</button>';
  }else{
    box.innerHTML='<div class="mtitle">保存</div>'+
      '<div class="mdesc">おすすめは <b>Googleドキュメント</b>（チェックリストとして読みやすく、印刷もきれい）。表で扱いたいときはスプレッドシート。</div>'+
      '<div class="mscope">範囲：'+
        (canTab?'<button class="chip'+(STATE.saveScope==='tab'?' on':'')+'" onclick="setScope(\'tab\')">このタブ</button>':'')+
        '<button class="chip'+(STATE.saveScope==='all'?' on':'')+'" onclick="setScope(\'all\')">全タブ</button></div>'+
      '<button class="mbtn rec" onclick="doExport(\'doc\')">Googleドキュメントに保存（おすすめ）</button>'+
      '<button class="mbtn" onclick="doExport(\'sheet\')">スプレッドシートに保存</button>'+
      '<div class="mresult" id="mresult"></div>'+
      '<button class="mlink" onclick="closeModal()">閉じる</button>';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function setScope(s){ STATE.saveScope=s; openModal('save'); }
function doExport(fmt){
  var scope=STATE.saveScope||'all';
  var tabId=(scope==='tab')?STATE.active:'';
  var res=document.getElementById('mresult');
  if(res) res.innerHTML='<span class="mwait">保存中…（数秒かかります）</span>';
  call(fmt==='doc'?'exportToDoc':'exportToSheet',[scope,tabId]).then(function(r){
    if(res) res.innerHTML='✅ 保存しました：<a href="'+r.url+'" target="_blank" rel="noopener">'+esc(r.name)+' を開く</a>';
    toast('保存しました');
  }).catch(function(e){ if(res) res.innerHTML='<span class="merr">保存に失敗：'+esc(e&&e.message||e)+'</span>'; });
}

function linkify(s){
  var e=esc(s);
  return e.replace(/(https?:\/\/[^\s　]+)/g,function(u){return '<a href="'+u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+u+'</a>';});
}
boot();
